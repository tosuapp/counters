<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPM Graph Overlay</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main id="overlay" class="overlay">
    <section class="graph-panel">
      <div class="topbar">
        <div class="beatmap">
          <span id="title" class="title">Waiting for beatmap</span>
          <span id="time" class="time">0:00 / 0:00</span>
        </div>
        <div class="legend">
          <span><i class="swatch player"></i>Player <b id="playerValue">0</b></span>
          <span><i class="swatch map"></i>Perfect</span>
        </div>
      </div>
      <canvas id="graph" width="960" height="360"></canvas>
    </section>
  </main>

  <script src="index.js"></script>
</body>

</html>
