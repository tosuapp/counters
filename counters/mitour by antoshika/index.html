<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>antoshika osu! Tournament Overlay</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link href="deps/fonts.css" rel="stylesheet">
    <script src="js/socket.js"></script>
    <script src="deps/countUp.umd.js"></script>
</head>
<body tabindex="0">
    <div id="app">
        <div id="mappool-overlay">
            <div class="pool-header">Mappool</div>
            <div class="pool-grid" id="pool-grid"></div>
        </div>

        <div class="top-bar" id="top-bar">
            <div class="inner-pick-badge" id="inner-pick-badge">PICK</div>
            <div class="card-bg" id="card-bg"></div>
            
            <div class="card-content">
                <div class="map-thumb" id="map-thumb"></div>
                <div class="map-details">
                    <div class="text-info">
                        <div class="title-row">
                            <div class="title-overflow-wrap">
                                <div id="title" class="song-title">Waiting for map...</div>
                            </div>
                        </div>
                        <div id="artist" class="song-artist">Artist</div>
                    </div>
                    
                    <div class="stats-row">
                        <div class="stats-grid">
                            <div class="stat-item"><span class="label">CS</span><span class="val" id="cs">0</span></div>
                            <div class="stat-item"><span class="label">AR</span><span class="val" id="ar">0</span></div>
                            <div class="stat-item"><span class="label">OD</span><span class="val" id="od">0</span></div>
                            <div class="stat-item highlight"><span class="label">SR</span><span class="val" id="sr">0.0★</span></div>
                            <div class="stat-item"><span class="label">BPM</span><span class="val" id="bpm">0</span></div>
                            <div class="stat-item"><span class="label">Length</span><span class="val" id="len">0:00</span></div>
                            <div class="stat-item"><span class="label">ID</span><span class="val" id="mapid">0</span></div>
                        </div>
                        <div id="map-status" class="status-badge"></div>
                    </div>

                    <div class="progress-container">
                        <div class="progress-bar-bg">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="pick-bar" id="pick-bar">
                <span id="pick-text">WARMUP</span>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="team red" id="team-red">
                <div class="team-info-left">
                    <div class="team-name" id="red-name">Red</div>
                    <div class="stars" id="red-stars"></div>
                </div>
                <div class="team-icon" id="red-icon"></div>
                <div class="score-wrapper">
                    <div class="score" id="red-score">0</div>
                    <div class="diff-val" id="red-diff"></div>
                </div>
            </div>

            <div class="vs-marker">VS</div>

            <div class="team blue" id="team-blue">
                <div class="score-wrapper">
                    <div class="score" id="blue-score">0</div>
                    <div class="diff-val" id="blue-diff"></div>
                </div>
                <div class="team-icon" id="blue-icon"></div>
                <div class="team-info-right">
                    <div class="team-name" id="blue-name">Blue</div>
                    <div class="stars" id="blue-stars"></div>
                </div>
            </div>
        </div>

        <div class="chat-overlay" id="chat-overlay">
            <div class="chat-messages" id="chat-messages"></div>
        </div>

    </div>
    <script src="main.js"></script>
</body>
</html>
